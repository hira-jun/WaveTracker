name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff check
        run: |
          cd backend
          python -m ruff check app tests

      - name: Pytest
        run: |
          cd backend
          python -m pytest -q

  frontend-tests:
    name: Frontend Typecheck and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npm run lint

      - name: Test
        run: |
          cd frontend
          npm run test

  collectors-contract:
    name: Collectors Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run collectors contract tests
        run: |
          python -m pytest collectors/tests -q

  architecture-warning:
    name: Architecture Guardrail Warnings
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run anti-pattern scan (warning mode)
        run: |
          set +e
          echo "Running architecture scan in warning mode"
          backend_http_in_domain=$(grep -R -n -E "HTTPException" backend/app/domain backend/app/services 2>/dev/null || true)

          if [ -n "$backend_http_in_domain" ]; then
            echo "::warning title=Domain/Service HTTPException usage::Avoid framework HTTP exceptions outside API boundary"
            echo "$backend_http_in_domain"
          fi

          if [ -z "$backend_http_in_domain" ]; then
            echo "No architecture anti-patterns detected by current rules."
          fi

  architecture-required:
    name: Architecture Guardrail Required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce no FastAPI dependency in domain
        run: |
          set -e
          echo "Enforcing required architecture rule: domain must be framework-agnostic"
          violations=$(grep -R -n -E "from fastapi|import fastapi|HTTPException" backend/app/domain 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "Domain layer must not depend on FastAPI or HTTP exceptions."
            echo "$violations"
            exit 1
          fi
          echo "Required architecture rule passed."

      - name: Enforce no direct storage adapter usage in routes
        run: |
          set -e
          echo "Enforcing required architecture rule: routes must not directly access adapters"
          violations=$(grep -R -n -E "local_table_adapter|local_blob_adapter|table_adapter\.|blob_adapter\.|services\.storage\.local_(blob|table)_adapter|from app\.services\.storage\.local_(blob|table)_adapter" backend/app/api/routes 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "Routes must depend on use-cases/dependencies, not direct storage adapter references."
            echo "$violations"
            exit 1
          fi
          echo "Required architecture rule passed."
