name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff check
        run: |
          cd backend
          python -m ruff check app tests

      - name: Pytest
        run: |
          cd backend
          python -m pytest -q

  frontend-tests:
    name: Frontend Typecheck and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npm run lint

      - name: Test
        run: |
          cd frontend
          npm run test

  architecture-warning:
    name: Architecture Guardrail Warnings
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run anti-pattern scan (warning mode)
        run: |
          set +e
          echo "Running architecture scan in warning mode"
          backend_http_in_domain=$(rg -n "HTTPException" backend/app/domain backend/app/services || true)
          route_to_adapter=$(rg -n "(local_table_adapter|local_blob_adapter|table_adapter\.|blob_adapter\.)" backend/app/api/routes || true)

          if [ -n "$backend_http_in_domain" ]; then
            echo "::warning title=Domain/Service HTTPException usage::Avoid framework HTTP exceptions outside API boundary"
            echo "$backend_http_in_domain"
          fi

          if [ -n "$route_to_adapter" ]; then
            echo "::warning title=Route direct adapter usage::Move business orchestration into use-case layer"
            echo "$route_to_adapter"
          fi

          if [ -z "$backend_http_in_domain" ] && [ -z "$route_to_adapter" ]; then
            echo "No architecture anti-patterns detected by current rules."
          fi
