services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wavetracker
      POSTGRES_USER: wavetracker
      POSTGRES_PASSWORD: wavetracker
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
